title: Contoso Books Training Lab
description: >-
  A hands-on MongoDB-to-Azure DocumentDB migration workshop using the
  Contoso Books sample application.

theme: just-the-docs

# Generated site lives under https://<org>.github.io/<repo>/. Override `url`
# and `baseurl` to match your GitHub Pages settings before publishing.
url: "https://jamesrcounts.github.io"
baseurl: "/contoso-books"

# Header links shown in the top-right of every page.
aux_links:
  "View on GitHub":
    - "https://github.com/jamesrcounts/contoso-books"
aux_links_new_tab: true

# Show the "next / previous" navigation between tasks.
nav_enabled: true

# Custom callout styles usable in task pages, e.g.:
#   {: .note }
#   > Heads up...
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: purple
  warning:
    title: Warning
    color: yellow
  caution:
    title: Caution
    color: red

# Keep the sample application and repo meta-files out of the published site —
# docs/ and media/ are the only content trees Jekyll should render.
exclude:
  - src/
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - LICENSE
  - SECURITY.md
  - SUPPORT.md
  - .devcontainer/
